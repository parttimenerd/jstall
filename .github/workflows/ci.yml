name: CI

on:
  push:
    branches: [ '**' ]  # Build all branches
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Run every 25 days to ensure fresh artifacts
    - cron: '0 0 */25 * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17, 21, 25]

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'sapmachine'
          cache: maven

      - name: Build package
        run: mvn package -DskipTests

      - name: Preserve external test JAR
        if: matrix.java-version == 17
        run: cp target/jstall.jar "$RUNNER_TEMP/jstall-external.jar"

      - name: Upload JAR artifact
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: jstall-jar
          path: target/jstall.jar
          retention-days: 30

      - name: Upload executable artifact
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: jstall
          path: target/jstall
          retention-days: 30

      - name: Run tests
        run: mvn clean test

      - name: Run tests with external JAR
        if: matrix.java-version == 17
        run: mvn test -Dtest.externalJar="$RUNNER_TEMP/jstall-external.jar"

      - name: Run tests with shell execution mode
        if: matrix.java-version == 17
        run: mvn test -Dtest.forceRunWithShell=true

      - name: Regenerate thread-dump fixtures
        if: matrix.java-version == 17
        run: mvn test -Dtest=ThreadDumpGeneratorTest -Djstall.generateThreadDumpFixtures=true

      - name: Run tests with regenerated fixtures
        if: matrix.java-version == 17
        run: mvn test

      - name: Build + test minimal variant with comprehensive testing
        if: matrix.java-version == 17
        run: python3 release.py test-minimal-jar

      - name: Verify minimal artifact is femtojar-reencoded
        if: matrix.java-version == 17
        run: |
          test -f target/jstall-minimal.jar
          unzip -l target/jstall-minimal.jar | grep 'me/bechberger/femtojar/rt/BundleBootstrap.class'
          unzip -p target/jstall-minimal.jar META-INF/MANIFEST.MF | grep '^Main-Class: me.bechberger.femtojar.rt.BundleBootstrap'
          unzip -p target/jstall-minimal.jar META-INF/MANIFEST.MF | grep '^X-Original-Main-Class:'

      - name: Upload minimal JAR artifact
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: jstall-minimal-jar
          path: target/jstall-minimal.jar
          retention-days: 30

      - name: Upload minimal executable artifact
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: jstall-minimal
          path: target/jstall-minimal
          retention-days: 30